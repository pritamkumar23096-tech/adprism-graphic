<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdPrism.Graphics</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins', sans-serif;}

body{
background:linear-gradient(135deg,#0a0a14,#0f1020,#07070c);
color:#fff;
scroll-behavior:smooth;
}

/* HEADER RESPONSIVE */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 14px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:99;
flex-wrap:wrap;
gap:10px;
}

.logo{
color:#00f7ff;
font-size:20px;
font-weight:700;
}

nav{
display:flex;
flex-wrap:wrap;
gap:8px;
align-items:center;
}

nav a{
color:#ddd;
text-decoration:none;
font-size:13px;
padding:6px 8px;
border-radius:8px;
}

nav a:hover{
background:rgba(0,247,255,0.15);
color:#00f7ff;
}

.btn{
background:linear-gradient(135deg,#00f7ff,#0088ff);
border:none;
padding:7px 10px;
border-radius:10px;
cursor:pointer;
font-weight:600;
color:#000;
font-size:12px;
}

section{
padding:40px 14px;
}

h2{
color:#00f7ff;
margin-bottom:14px;
font-size:22px;
}

#home{
text-align:center;
padding:60px 14px;
}

#home h1{
font-size:28px;
background:linear-gradient(90deg,#00f7ff,#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

#home p{color:#aaa;margin-top:10px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
}

.card{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
padding:12px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.08);
}

.card img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:10px;
}

.hidden{display:none;}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
border:none;
outline:none;
background:#151525;
color:#fff;
}

textarea{height:80px;resize:none;}

#loginBox{
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.loginCard{
background:#111;
padding:20px;
border-radius:12px;
width:260px;
}

.whatsapp{
position:fixed;
bottom:15px;
right:15px;
background:#25D366;
color:#fff;
padding:12px 14px;
border-radius:50px;
font-weight:600;
cursor:pointer;
}

#modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.modalBox{
background:#111;
padding:20px;
border-radius:12px;
max-width:300px;
text-align:center;
}

.modalBox img{width:100px;height:100px;border-radius:50%;}
</style>
</head>
<body>

<header>
<div class="logo">AdPrism.Graphics</div>

<nav>
<a href="#home">Home</a>
<a href="#about">About</a>
<a href="#services">Services</a>
<a href="#portfolio">Portfolio</a>
<a href="#candidates">Candidates</a>
<a href="#prompt">Prompts</a>
<a href="#pricing">Pricing</a>
<a href="#contact">Contact</a>

<button class="btn" onclick="document.getElementById('loginBox').style.display='flex'">Admin Login</button>
<button class="btn" id="logoutBtn" style="display:none">Logout</button>
</nav>
</header>

<section id="home">
<h1>Creative Digital Studio</h1>
<p>Design • Branding • UI • Graphics</p>
</section>

<section id="about"><h2>About</h2><div class="card">Modern agency</div></section>
<section id="services"><h2>Services</h2><div class="card">Design Services</div></section>
<section id="portfolio"><h2>Portfolio</h2><div class="card">Work Showcase</div></section>

<section id="candidates">
<h2>Candidates</h2>

<div id="candForm" class="hidden">
<input id="cName" placeholder="Name">
<input id="cRole" placeholder="Role">
<button class="btn" onclick="addCand()">Add Candidate</button>
</div>

<div id="candList" class="grid"></div>
</section>

<section id="prompt">
<h2>Prompts</h2>

<div id="promptForm" class="hidden">
<input id="pTitle" placeholder="Title">
<button class="btn" onclick="addPrompt()">Add Prompt</button>
</div>

<div id="promptList" class="grid"></div>
</section>

<section id="contact">
<h2>Contact</h2>
<div class="card">
<input id="userName" placeholder="Name">
<input id="userPhone" placeholder="Phone">
<textarea id="userMsg" placeholder="Message"></textarea>
<button class="btn" onclick="sendWhatsApp()">Send WhatsApp</button>
</div>
</section>

<div id="loginBox">
<div class="loginCard">
<input id="pass" placeholder="Password">
<button class="btn" id="loginBtn">Login</button>
</div>
</div>

<div id="modal" onclick="closeModal()">
<div class="modalBox" id="modalBox"></div>
</div>

<div class="whatsapp" onclick="sendWhatsApp()">💬</div>

<script>
let admin = localStorage.getItem("admin") === "1";
const ADMIN_PASSWORD = "admin123";

let candidates = JSON.parse(localStorage.getItem("candidates") || "[]");
let prompts = JSON.parse(localStorage.getItem("prompts") || "[]");

function save(){
localStorage.setItem("candidates",JSON.stringify(candidates));
localStorage.setItem("prompts",JSON.stringify(prompts));
}

function addCand(){
let name=document.getElementById("cName").value;
candidates.push({name});
save();render();
}

function addPrompt(){
let title=document.getElementById("pTitle").value;
prompts.push({title});
save();render();
}

function render(){
document.getElementById("candList").innerHTML=candidates.map(c=>`<div class='card'><h3>${c.name}</h3></div>`).join("");
document.getElementById("promptList").innerHTML=prompts.map(p=>`<div class='card'><h3>${p.title}</h3></div>`).join("");
}

function sendWhatsApp(){
let msg=userMsg.value;
let url="https://api.whatsapp.com/send?phone=919999999999&text="+encodeURIComponent(msg);
window.open(url,"_blank");
}

loginBtn.onclick=()=>{
if(pass.value===ADMIN_PASSWORD){admin=true;localStorage.setItem("admin","1");loginBox.style.display="none";}else alert("Wrong Password");
};

logoutBtn.onclick=()=>{admin=false;localStorage.removeItem("admin");};

render();
</script>

</body>
</html>
